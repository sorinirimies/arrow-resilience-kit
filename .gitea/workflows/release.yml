name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the Gitea Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── 0. Validate tag ──────────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        run: |
          curl -sSfL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Validate tag
        id: resolve
        run: nu scripts/validate_tag.nu "$TAG" | tee -a "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

      - name: Cleanup workspace
        if: always()
        run: nu scripts/cleanup.nu --ci

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build project
        run: ./gradlew assemble --no-daemon --stacktrace

      - name: Run all tests
        run: ./gradlew allTests --no-daemon --stacktrace

      - name: Cleanup workspace
        if: always()
        run: nu scripts/cleanup.nu --ci

  # ── 2. Create Release ────────────────────────────────────────────────────────
  release:
    name: Create Gitea Release
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          cargo install git-cliff --locked

      - name: Install Nushell
        run: |
          curl -sSfL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Create Gitea Release
        run: >
          nu scripts/create_gitea_release.nu
          "${{ needs.validate.outputs.tag }}"
          --gitea-url "${{ github.server_url }}"
          --repo "${{ github.repository }}"
          --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Cleanup workspace
        if: always()
        run: nu scripts/cleanup.nu --ci

  # ── 3. Publish to GitHub Packages ───────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.PACKAGES_PUBLISH != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  PACKAGES_PUBLISH is not configured — skipping publish."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up JDK 17
        if: env.HAS_TOKEN == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        if: env.HAS_TOKEN == 'true'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Publish to GitHub Packages
        if: env.HAS_TOKEN == 'true'
        run: ./gradlew publish --no-daemon
        env:
          PACKAGES_PUBLISH: ${{ secrets.PACKAGES_PUBLISH }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish complete
        if: env.HAS_TOKEN == 'true'
        run: echo "✅ Published ${{ needs.validate.outputs.tag }} to GitHub Packages."

      - name: Cleanup workspace
        if: always()
        run: nu scripts/cleanup.nu --ci
