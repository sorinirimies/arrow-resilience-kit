name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

# Cancel in-progress runs on the same branch/PR so we never queue up stale
# jobs after a force-push.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build project
        run: ./gradlew assemble --no-daemon --stacktrace

      - name: Cleanup workspace
        if: always()
        run: |
          if command -v nu > /dev/null 2>&1; then
            nu scripts/cleanup.nu --ci
          else
            ./gradlew --stop 2>/dev/null || true
            rm -rf build kotlin-js-store
            rm -rf .gradle/buildOutputCleanup .gradle/expanded .gradle/kotlin .gradle/vcs-1 .gradle/file-system.probe
            find .gradle -maxdepth 1 -type d -regex '.*/[0-9].*' -exec rm -rf {} + 2>/dev/null || true
          fi

  # ── 2. Test ──────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run all tests
        run: ./gradlew allTests --no-daemon --stacktrace

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/build/test-results/
            **/build/reports/
          retention-days: 7

      - name: Cleanup workspace
        if: always()
        run: |
          if command -v nu > /dev/null 2>&1; then
            nu scripts/cleanup.nu --ci
          else
            ./gradlew --stop 2>/dev/null || true
            rm -rf build kotlin-js-store
            rm -rf .gradle/buildOutputCleanup .gradle/expanded .gradle/kotlin .gradle/vcs-1 .gradle/file-system.probe
            find .gradle -maxdepth 1 -type d -regex '.*/[0-9].*' -exec rm -rf {} + 2>/dev/null || true
          fi

  # ── 3. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run detekt / check
        run: ./gradlew check --no-daemon --stacktrace

      - name: Cleanup workspace
        if: always()
        run: |
          if command -v nu > /dev/null 2>&1; then
            nu scripts/cleanup.nu --ci
          else
            ./gradlew --stop 2>/dev/null || true
            rm -rf build kotlin-js-store
            rm -rf .gradle/buildOutputCleanup .gradle/expanded .gradle/kotlin .gradle/vcs-1 .gradle/file-system.probe
            find .gradle -maxdepth 1 -type d -regex '.*/[0-9].*' -exec rm -rf {} + 2>/dev/null || true
          fi

  # ── 4. Documentation ────────────────────────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate Dokka documentation
        run: ./gradlew dokkaHtml --no-daemon --stacktrace

      - name: Cleanup workspace
        if: always()
        run: |
          if command -v nu > /dev/null 2>&1; then
            nu scripts/cleanup.nu --ci
          else
            ./gradlew --stop 2>/dev/null || true
            rm -rf build kotlin-js-store
            rm -rf .gradle/buildOutputCleanup .gradle/expanded .gradle/kotlin .gradle/vcs-1 .gradle/file-system.probe
            find .gradle -maxdepth 1 -type d -regex '.*/[0-9].*' -exec rm -rf {} + 2>/dev/null || true
          fi
