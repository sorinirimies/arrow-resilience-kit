name: Deploy Documentation (Development)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "README.md"
      - "Module.md"
      - "build.gradle.kts"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGES_PUBLISH }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Generate Dokka documentation
        run: ./gradlew dokkaHtml --no-daemon

      - name: Prepare documentation
        run: |
          # Clean and prepare docs directory
          rm -rf docs/
          mkdir -p docs
          cp -r build/docs/* docs/
          touch docs/.nojekyll

          # Add build info
          echo "<!-- Generated by GitHub Actions -->" > docs/BUILD_INFO.html
          echo "<p>Branch: ${{ github.ref_name }}</p>" >> docs/BUILD_INFO.html
          echo "<p>Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>" >> docs/BUILD_INFO.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> docs/BUILD_INFO.html

      - name: Commit and push documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: update API documentation from ${{ github.sha }}"
          git push
