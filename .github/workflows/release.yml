name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Build project
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run tests
        run: ./gradlew allTests --no-daemon --stacktrace

  # ── 2. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          cargo install git-cliff --locked

      - name: Generate release notes
        run: |
          git-cliff --current --strip header -o RELEASE_NOTES.md
          git-cliff -o CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Publish to GitHub Packages ───────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.PACKAGES_PUBLISH != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  PACKAGES_PUBLISH is not configured — skipping publish."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up JDK 17
        if: env.HAS_TOKEN == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        if: env.HAS_TOKEN == 'true'
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Publish to GitHub Packages
        if: env.HAS_TOKEN == 'true'
        run: ./gradlew publish --no-daemon
        env:
          PACKAGES_PUBLISH: ${{ secrets.PACKAGES_PUBLISH }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate and deploy documentation
        if: env.HAS_TOKEN == 'true'
        run: |
          ./gradlew dokkaHtml --no-daemon

          rm -rf docs/
          mkdir -p docs
          cp -r build/docs/* docs/
          touch docs/.nojekyll

          echo "<!-- Generated by GitHub Actions -->" > docs/VERSION.html
          echo "<p>Version: ${{ needs.validate.outputs.tag }}</p>" >> docs/VERSION.html
          echo "<p>Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>" >> docs/VERSION.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> docs/VERSION.html

      - name: Commit and push documentation
        if: env.HAS_TOKEN == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          git add docs/
          git diff --staged --quiet || git commit -m "docs: update API documentation for ${{ needs.validate.outputs.tag }}"
          git push origin main

      - name: Upload build artifacts
        if: env.HAS_TOKEN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/
            build/reports/
          retention-days: 7
