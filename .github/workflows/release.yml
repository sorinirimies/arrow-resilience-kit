name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nushell
        run: |
          curl -sSfL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Validate tag
        id: resolve
        run: nu scripts/validate_tag.nu "$TAG" | tee -a "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build project
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run tests
        run: ./gradlew allTests --no-daemon --stacktrace

  # ── 2. Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          cargo install git-cliff --locked

      - name: Install Nushell
        run: |
          curl -sSfL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Generate release notes
        run: nu scripts/release_notes.nu "${{ needs.validate.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Publish to GitHub Packages ───────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.PACKAGES_PUBLISH != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  PACKAGES_PUBLISH is not configured — skipping publish."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Set up JDK 17
        if: env.HAS_TOKEN == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        if: env.HAS_TOKEN == 'true'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Publish to GitHub Packages
        if: env.HAS_TOKEN == 'true'
        run: ./gradlew publish --no-daemon
        env:
          PACKAGES_PUBLISH: ${{ secrets.PACKAGES_PUBLISH }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate and deploy documentation
        if: env.HAS_TOKEN == 'true'
        run: |
          ./gradlew dokkaHtml --no-daemon

          rm -rf docs/
          mkdir -p docs
          cp -r build/docs/* docs/
          touch docs/.nojekyll

          echo "<!-- Generated by GitHub Actions -->" > docs/VERSION.html
          echo "<p>Version: ${{ needs.validate.outputs.tag }}</p>" >> docs/VERSION.html
          echo "<p>Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>" >> docs/VERSION.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> docs/VERSION.html

      - name: Commit and push documentation
        if: env.HAS_TOKEN == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git checkout main
          git add docs/
          git diff --staged --quiet || git commit -m "docs: update API documentation for ${{ needs.validate.outputs.tag }}"
          git push origin main

      - name: Upload build artifacts
        if: env.HAS_TOKEN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/libs/
            build/reports/
          retention-days: 7
