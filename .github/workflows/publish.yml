name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish"
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PACKAGES_PUBLISH }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          cache-read-only: false

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Build
        run: ./gradlew assemble --no-daemon

      - name: Generate Dokka documentation
        run: ./gradlew dokkaHtml --no-daemon

      - name: Publish to GitHub Packages
        run: ./gradlew publish --no-daemon
        env:
          PACKAGES_PUBLISH: ${{ secrets.PACKAGES_PUBLISH }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Prepare documentation for GitHub Pages
        run: |
          # Clean and prepare docs directory
          rm -rf docs/
          mkdir -p docs
          cp -r build/docs/* docs/
          touch docs/.nojekyll

          # Add version info
          echo "<!-- Generated by GitHub Actions -->" > docs/VERSION.html
          echo "<p>Version: ${{ github.ref_name }}</p>" >> docs/VERSION.html
          echo "<p>Built: $(date -u +"%Y-%m-%d %H:%M:%S UTC")</p>" >> docs/VERSION.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> docs/VERSION.html

      - name: Commit and push documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "docs: update API documentation for ${{ github.ref_name }}"
          git push

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            build/libs/
            build/reports/
          retention-days: 7
