name: Nightly Dependency Upgrade

on:
  schedule:
    # Runs at 02:00 UTC every day (03:00 CET)
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: deps-update
  cancel-in-progress: true

jobs:
  upgrade-deps:
    name: Upgrade Dependencies
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Install Nushell
        run: |
          curl -sSfL https://github.com/nushell/nushell/releases/latest/download/nu-*-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv nu-*-x86_64-unknown-linux-gnu/nu /usr/local/bin/

      - name: Upgrade dependencies
        run: nu scripts/upgrade_deps.nu --commit --bot-name "github-actions[bot]" --bot-email "github-actions[bot]@users.noreply.github.com"
