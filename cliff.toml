# git-cliff configuration for Arrow Resilience Kit
# Documentation: https://git-cliff.org/docs/
# 
# git-cliff is language-agnostic and works with any Git repository,
# including Kotlin Multiplatform projects. It only reads Git commits.

[changelog]
# Changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.breaking %} **[BREAKING]**{% endif %}
{% endfor -%}
{% endfor -%}

"""

# Footer template for links
footer = """
<!-- generated by git-cliff -->
"""

# Remove leading and trailing whitespace from changelog
trim = true

[git]
# Parse commits according to Conventional Commits
conventional_commits = true

# Filter out commits that are not conventional
filter_unconventional = true

# Process each line of a commit message as an individual commit
split_commits = false

# Regex for preprocessing commit messages
commit_preprocessors = [
    # Remove issue numbers from commits
    #{ pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]

# Regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    { message = "^build", group = "Build" },
    { message = "^revert", group = "Reverts" },
    { body = ".*security", group = "Security" },
    { message = "^breaking", group = "Breaking Changes" },
]

# Protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false

# Filter out commits with message matching this regex
filter_commits = false

# Glob pattern for matching git tags
tag_pattern = "v[0-9].*"

# Skip tags that match this regex
skip_tags = "v0.0.1-beta.1"

# Ignore tags that match this regex
ignore_tags = ""

# Sort commits inside sections by oldest/newest order
sort_commits = "oldest"

# Limit the number of commits included in the changelog
# limit_commits = 42
